<!DOCTYPE html>
<html lang="en">
<!--

  Simple Trax & Taavi Viikman
  https://youtu.be/ZXwk8sDts0Y

<head>
    <meta charset="UTF-8">
    <title>Rain & Wind Synthesizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;400&display=swap" rel="stylesheet">
    <script type="application/javascript" src="./rain.js"></script>
    <style>
        :root {
            --bg: #3a3e47; 
            --line: rgba(255, 255, 255, 0.15); 
            --accent: #ffffff;
            --text-dim: #b0b5be; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            color: #fff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden; 
            position: relative;
        }

        #canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }

        #infoModal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--bg);
            border: 1px solid var(--line);
            padding: 30px;
            max-width: 420px;
            text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .modal-content h3 {
            font-weight: 100;
            letter-spacing: 5px;
            text-transform: uppercase;
            font-size: 0.8rem;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-content p {
            font-size: 10px;
            line-height: 1.5;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .modal-content a { color: #fff; text-decoration: none; border-bottom: 1px solid var(--line); }

        .copyright {
            font-size: 9px;
            color: rgba(255,255,255,0.3);
            text-align: center;
            margin-top: 15px;
            letter-spacing: 1px;
        }

        .coffee-wrapper { margin: 15px 0; text-align: center; }
        .close-btn { margin-top: 10px; width: 100%; }

        .ui-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 35px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: scale(1.1); 
            transform-origin: center;
        }

        .header-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            gap: 15px; 
            margin-bottom: 15px; 
            position: relative;
        }

        .info-trigger {
            position: absolute;
            top: -15px;
            right: -15px;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.2s;
            padding: 10px;
        }

        .info-trigger:hover { opacity: 1; }

        h2 { 
            font-weight: 100; 
            letter-spacing: 20px; 
            text-transform: uppercase; 
            font-size: 0.7rem;
            margin: 0 -20px 0 0; 
            opacity: 0.6;
            text-align: center;
        }

        .controls-row { 
            display: flex; 
            gap: 10px; 
            align-items: center;
        }

        .btn, .preset-select {
            background: transparent;
            color: white;
            border: 1px solid var(--line);
            padding: 0 15px;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            height: 38px;
            box-sizing: border-box;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            outline: none !important;
        }

        #transportButton, #randomButton { width: 100px; }

        .preset-select {
            outline: none;
            min-width: 180px;
            text-align-last: center;
            appearance: none;
            -webkit-appearance: none;
        }

        .preset-select option { background: #3a3e47; color: white; }
        .btn:disabled { opacity: 0.3; cursor: wait; }
        .btn.active { background: #fff; color: #000; }

        .rack { 
            display: flex; 
            background: rgba(0, 0, 0, 0.1);
            border: 1px solid var(--line);
            padding: 20px 10px; 
        }

        .channel { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            width: 85px;
            height: 310px; 
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        .channel:last-child { border-right: none; }

        label { 
            font-size: 8px; 
            height: 40px;
            text-align: center; 
            color: var(--text-dim); 
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px; 
            display: flex;
            align-items: center;
        }

        .slider-wrapper { height: 220px; width: 40px; display: flex; align-items: center; justify-content: center; }

        input[type=range] { 
            -webkit-appearance: none;
            appearance: none;
            width: 220px;
            height: 40px;
            background: transparent;
            outline: none !important;
            transform: rotate(-90deg);
            margin: 0;
            border-top: 1px solid var(--line);
            border-bottom: 1px solid var(--line);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 2px;
            height: 38px;
            background: rgba(255, 255, 255, 0.8);
        }

        .val-display { 
            font-family: monospace; 
            font-size: 10px; 
            color: #fff; 
            margin-top: 5px; 
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div id="infoModal" onclick="toggleAbout(false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>About</h3>
            <p>Interactive rain and wind generator using <strong>Pure Data</strong> and <strong>WebAssembly</strong> via hvcc.</p>
            <p>• Sound engine made in PD<br>• Reactive Canvas visuals<br>• Sliders mapped to PD patch parameters</p>
            <p>Source: <a href="https://github.com/ledlaux/pd-rainwind-synth" target="_blank">GitHub</a></p>
            <div class="coffee-wrapper">
                <a href="https://www.buymeacoffee.com/ledlaux" target="_blank">
                    <img src="https://img.shields.io/badge/Buy%20Me%20a%20Coffee-FFFFFF?style=for-the-badge&logo=buy-me-a-coffee&logoColor=black" alt="Coffee">
                </a>
            </div>
            <div class="copyright">© 2026 Vadims Maksimovs | MIT License</div>
            <button class="btn close-btn" onclick="toggleAbout(false)">Close</button>
        </div>
    </div>

    <div class="ui-layer">
        <div class="header-section">
            <div class="info-trigger" onclick="toggleAbout(true)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2">
                    <path d="M12 12v8a2 2 0 0 0 4 0"></path>
                    <path d="M12 2a10 10 0 0 0-10 10l10 0l10 0a10 10 0 0 0-10-10Z"></path>
                </svg>
            </div>
            <h2>Rain & Wind</h2>
            <div class="controls-row">
                <button id="transportButton" class="btn" onclick="toggleTransport()" disabled>Loading...</button>
              <select id="presetSelect" class="preset-select" onchange="loadPreset(this.value)">
                </select>
                <button id="randomButton" class="btn" onclick="randomiseParameters()">Random</button>
            </div>
        </div>
        <div class="rack" id="rack"></div>
    </div>

<script>
    var heavyModule = null, loader = null;
    const controls = [
        { cc: 7,  name: "Volume", val: 71 }, 
        { cc: 13, name: "Rain", val: 1, range: 1 }, 
        { cc: 14, name: "Wind", val: 33 },
        { cc: 17, name: "Density", val: 38 }, 
        { cc: 12, name: "HF", val: 120 },
        { cc: 15, name: "Impact", val: 23 }, 
        { cc: 16, name: "Droplet", val: 127 },
        { cc: 11, name: "Space", val: 60 },
        { cc: 10, name: "Surface", val: 41 }
    ];

    const presets = { 
        light: [71, 1, 33, 38, 120, 23, 127, 60, 41], 
        medium: [71, 1, 33, 66, 21, 87, 127, 80, 80], 
        intensive: [50, 1, 54, 70, 16, 127, 127, 127, 127 ] };

    let rainDensity, stormLevel, windTurb;

    function toggleAbout(show) { document.getElementById('infoModal').style.display = show ? 'flex' : 'none'; }
    function syncVisualState() {
        rainDensity = controls.find(c => c.cc === 17).val;
        stormLevel = controls.find(c => c.cc === 13).val;
        windTurb = controls.find(c => c.cc === 14).val;
    }

    window.onload = function() {
    const select = document.getElementById('presetSelect');
    if (select) {
        select.innerHTML = '';
        Object.keys(presets).forEach(key => {
            const opt = document.createElement('option');
            opt.value = key;
            opt.innerText = key.charAt(0).toUpperCase() + key.slice(1);
            select.appendChild(opt);
        });
    }
    syncVisualState();
    if (typeof rain_Module === 'function') {
        rain_Module().then(m => {
            heavyModule = m; 
            loader = new m.AudioLibLoader();
            const b = document.getElementById("transportButton");
            b.disabled = false; 
            b.innerText = "Play";
        });
    }
    }

    function toggleTransport() {
        const b = document.getElementById("transportButton");
        if(!loader.webAudioContext) loader.init({ blockSize: 2048 }).then(() => startAudio(b));
        else loader.isPlaying ? stopAudio(b) : startAudio(b);
    }

    function startAudio(b) {
        loader.start(); b.innerText = "Pause"; b.classList.add("active");
        setTimeout(() => controls.forEach(c => sendToSynth(c.cc, c.val)), 150);
    }

    function stopAudio(b) { loader.stop(); b.innerText = "Play"; b.classList.remove("active"); }

    function sendToSynth(cc, value) {
        if (loader && loader.isPlaying) {
            const msg = [0xB0, cc, value];
            loader.webAudioWorklet ? loader.sendMidi(msg) : loader.audiolib.sendMidi(msg);
        }
    }

    function updateParam(cc, v) {
    const c = controls.find(ctrl => ctrl.cc === cc);
    if (!c) return;

    c.val = v;
    
    const s = document.querySelector(`input[data-cc="${cc}"]`);
    if (s && s.value != v) s.value = v;
    const d = document.getElementById(`val-${cc}`);
    if (d) d.innerText = v;
    if (cc === 17) rainDensity = v;
    if (cc === 13) stormLevel = v;
    if (cc === 14) windTurb = v;

    if (cc === 7) {
        const curvedVol = Math.floor(Math.pow(v / 127, 2) * 127);
        sendToSynth(cc, curvedVol);
    } else {
        sendToSynth(cc, v);
    }
    }

    function loadPreset(k) { presets[k].forEach((v, i) => updateParam(controls[i].cc, v)); }
    function randomiseParameters() { 
        controls.forEach(c => { 
            if (c.cc !== 7 && c.cc !== 13) { 
                updateParam(c.cc, Math.floor(Math.random() * ((c.range || 127) + 1))); 
            } 
        }); 
    }
    const canvas = document.getElementById('canvas'), ctx = canvas.getContext('2d');
    let width, height, streaks = [];
    function resize() { width = canvas.width = window.innerWidth; height = canvas.height = window.innerHeight; }

    class RainStreak {
        constructor() { this.init(); }
        init() { this.x = Math.random()*width; this.y = Math.random()*height; this.z = Math.random(); this.len = 5+(this.z*10); this.speed = 10+(this.z*12); }
        update() {
            this.y += this.speed*(1+(stormLevel*0.5));
            this.x += ((windTurb-64)/8)*(this.z+0.2);
            if (this.y > height) { this.y = -20; this.x = Math.random()*width; }
            if (this.x > width) this.x = 0; if (this.x < 0) this.x = width;
        }
        draw() {
            ctx.beginPath(); ctx.strokeStyle = `rgba(255,255,255,${0.1+(this.z*0.4)})`; ctx.lineWidth = 0.5;
            ctx.moveTo(this.x, this.y); ctx.lineTo(this.x+((windTurb-64)/8), this.y+this.len); ctx.stroke();
        }
    }

    function init() { resize(); streaks = Array.from({length: 1000}, () => new RainStreak()); }
    function animate() {
    ctx.fillStyle = '#3a3e47'; 
    ctx.fillRect(0, 0, width, height);

    if (stormLevel > 0) {
        const count = Math.floor((rainDensity / 127) * streaks.length);
        for (let i = 0; i < count; i++) { 
            streaks[i].update(); 
            streaks[i].draw(); 
        }
    }
    requestAnimationFrame(animate);
    }

    const rack = document.getElementById('rack');
    controls.forEach(c => {
        const div = document.createElement('div'); div.className = 'channel';
        div.innerHTML = `<label>${c.name}</label><div class="slider-wrapper"><input type="range" min="0" max="${c.range||127}" value="${c.val}" data-cc="${c.cc}"></div><div class="val-display" id="val-${c.cc}">${c.val}</div>`;
        div.querySelector('input').oninput = (e) => updateParam(c.cc, parseInt(e.target.value));
        rack.appendChild(div);
    });

    window.addEventListener('resize', init);
    init(); animate();

</script>
</body>
</html>
